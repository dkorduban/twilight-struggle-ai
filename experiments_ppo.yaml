defaults:
  n_iterations: 400
  games_per_iter: 200
  lr: 0.0003
  clip_eps: 0.2
  ent_coef: 0.02
  ent_coef_final: 0.005
  max_kl: 0.02
  league_mix_k: 3
  league_recency_tau: 0.7
  league_fixture_fadeout: 0.9
